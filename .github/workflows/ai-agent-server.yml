name: Deploy ai-agent-server to EC2

on:
  push:
    branches: [main]
    paths:
      - "ai-agent-server/**"
      - "log-server/**"
      - ".github/workflows/ai-agent-server.yml"
  pull_request:
    branches: [main]
    paths:
      - "ai-agent-server/**"
      - ".github/workflows/ai-agent-server.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r ai-agent-server/requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile ai-agent-server/server.py
          python -m py_compile ai-agent-server/agents/*.py
          python -m py_compile ai-agent-server/tools/*.py
          python -m py_compile ai-agent-server/storage/*.py
          python -m py_compile ai-agent-server/config/*.py

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ai_ec2_key
          chmod 600 /tmp/ai_ec2_key

      - name: Copy ai-agent-server code
        run: |
          scp -i /tmp/ai_ec2_key \
            -o StrictHostKeyChecking=no \
            -r ./ai-agent-server \
            ${{ secrets.EC2_AI_USER }}@${{ secrets.EC2_AI_HOST }}:~/

      - name: Copy log-server configs
        run: |
          scp -i /tmp/ai_ec2_key \
            -o StrictHostKeyChecking=no \
            -r ./log-server \
            ${{ secrets.EC2_AI_USER }}@${{ secrets.EC2_AI_HOST }}:~/

      - name: Deploy on EC2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AURORA_HOST: ${{ secrets.AURORA_HOST }}
          AURORA_USER: ${{ secrets.AURORA_USER }}
          AURORA_PASSWORD: ${{ secrets.AURORA_PASSWORD }}
          EC2_T3_HOST: ${{ secrets.EC2_HOST }}
          LOKI_URL: http://localhost:3100
        run: |
          # .env 파일 생성
          printf 'LLM_PROVIDER=CLAUDE_API\nANTHROPIC_API_KEY=%s\nCLAUDE_MODEL=claude-sonnet-4-6\nLOKI_URL=%s\nLOKI_LOG_QUERY={job="app_logs"}\nPROMETHEUS_URL=http://localhost:9090\nPOLL_INTERVAL_SECONDS=30\nLOG_LOOKBACK_MINUTES=5\nAURORA_HOST=%s\nAURORA_PORT=5432\nAURORA_DB=ai_agent\nAURORA_USER=%s\nAURORA_PASSWORD=%s\nHOST=0.0.0.0\nPORT=8000\n' \
            "$ANTHROPIC_API_KEY" "$LOKI_URL" "$AURORA_HOST" "$AURORA_USER" "$AURORA_PASSWORD" \
            > /tmp/ai_agent.env

          scp -i /tmp/ai_ec2_key \
            -o StrictHostKeyChecking=no \
            /tmp/ai_agent.env \
            ${{ secrets.EC2_AI_USER }}@${{ secrets.EC2_AI_HOST }}:~/ai-agent-server/.env

          ssh -i /tmp/ai_ec2_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_AI_USER }}@${{ secrets.EC2_AI_HOST }} '
              # Python 및 pip 설치 확인
              if ! command -v python3 &>/dev/null; then
                sudo apt-get update -q && sudo apt-get install -y python3 python3-pip python3-venv
              fi

              # 가상환경 생성 및 의존성 설치
              cd ~/ai-agent-server
              python3 -m venv .venv
              .venv/bin/pip install -q -r requirements.txt

              # log-server (Loki + Grafana + Prometheus) 실행
              cd ~/log-server/g5
              EC2_HOST=$EC2_T3_HOST ./start.sh

              # 기존 ai-agent-server 프로세스 종료
              PID_FILE=$HOME/ai-agent-server/server.pid
              if [ -f "$PID_FILE" ]; then
                OLD_PID=$(cat "$PID_FILE")
                kill "$OLD_PID" 2>/dev/null && echo "Killed PID $OLD_PID" || echo "No process at PID $OLD_PID"
                rm -f "$PID_FILE"
                sleep 2
              fi

              # ai-agent-server 실행
              cd ~/ai-agent-server
              mkdir -p logs
              nohup .venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000 \
                > logs/server.log 2>&1 </dev/null &
              echo $! > "$PID_FILE"
              echo "Started ai-agent-server PID $(cat $PID_FILE)"
            '

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ai_ec2_key /tmp/ai_agent.env
