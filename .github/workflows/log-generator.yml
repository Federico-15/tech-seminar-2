name: Deploy log-generator to EC2

on:
  push:
    branches: [main]
    paths:
      - "log-generator/**"
      - ".github/workflows/log-generator.yml"
  pull_request:
    branches: [main]
    paths:
      - "log-generator/**"
      - ".github/workflows/log-generator.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -m py_compile log-generator/log_generator.py

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/log-generator
            git pull origin main

            sudo systemctl restart log-generator
            sudo systemctl is-active log-generator
