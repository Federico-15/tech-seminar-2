name: Deploy order-service to EC2

on:
  push:
    branches: [main]
    paths:
      - "order-service/**"
      - ".github/workflows/order-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "order-service/**"
      - ".github/workflows/order-service.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd order-service
          chmod +x gradlew
          ./gradlew build -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: order-service/build/libs/*[^plain].jar

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: order-service-jar
          path: ./artifact

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Copy JAR to EC2
        run: |
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            ./artifact/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/order-service/

      - name: Deploy on EC2
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # .env 파일 로컬 생성 후 전송
          cat > /tmp/app.env << EOF
          DB_URL=${DB_URL}
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}
          DB_POOL_SIZE=5
          LOG_PATH=~/order-service/logs
          EOF

          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            /tmp/app.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/order-service/.env

          # 배포 실행
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
              mkdir -p ~/order-service/logs
              pkill -f "order-service.*\.jar" || true
              sleep 3
              cd ~/order-service
              nohup java -jar *.jar > logs/startup.log 2>&1 &
              disown
              echo "Started PID $!"
            '

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/app.env
