name: Deploy order-service to EC2

on:
  push:
    branches: [main]
    paths:
      - "order-service/**"
      - ".github/workflows/order-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "order-service/**"
      - ".github/workflows/order-service.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd order-service
          chmod +x gradlew
          ./gradlew build -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: order-service/build/libs/*[^plain].jar

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: order-service-jar
          path: ./artifact

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Copy JAR to EC2
        run: |
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            ./artifact/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/order-service/

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -x

          # SSH 키 확인
          echo "=== SSH key check ==="
          head -1 /tmp/ec2_key
          wc -l /tmp/ec2_key

          # .env 파일 로컬 생성 (공백 없이)
          printf 'DB_URL=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nDB_POOL_SIZE=5\nLOG_PATH=/home/%s/order-service/logs\n' \
            "$DB_URL" "$DB_USERNAME" "$DB_PASSWORD" "$EC2_USER" > /tmp/app.env

          echo "=== .env check ==="
          wc -l /tmp/app.env

          # .env 전송
          echo "=== scp .env ==="
          scp -v -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            /tmp/app.env \
            ${EC2_USER}@${EC2_HOST}:/home/${EC2_USER}/order-service/.env

          # 배포 실행
          echo "=== ssh deploy ==="
          ssh -v -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} '
              mkdir -p $HOME/order-service/logs
              pkill -f "order-service.*\.jar" || true
              sleep 3
              cd $HOME/order-service
              nohup java -jar *.jar > logs/startup.log 2>&1 &
              disown
              echo "Started PID $!"
            '

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/app.env
