---
# vLLM 서버 Deployment (Qwen3:30B 상시 서빙)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - Qwen/Qwen3-30B-A3B-AWQ
            - --quantization
            - awq
            - --max-model-len
            - "8192"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1   # A10G GPU 1개
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen3-model-cache-pvc
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
# vLLM 서비스
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: ai-agents
spec:
  selector:
    app: vllm-server
  ports:
    - port: 8000
      targetPort: 8000
---
# AI Agent Job (KEDA 트리거 — PR 이벤트 시 생성)
apiVersion: batch/v1
kind: Job
metadata:
  name: ai-agent-scan
  namespace: ai-agents
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ai-agent
          image: ${REGISTRY}/ai-agent-server:${IMAGE_TAG}
          env:
            - name: LLM_PROVIDER
              value: "QWEN_LOCAL"          # 데모: vLLM 사용
            - name: VLLM_BASE_URL
              value: "http://vllm-service.ai-agents.svc.cluster.local:8000"
            - name: VLLM_MODEL
              value: "Qwen/Qwen3-30B-A3B-AWQ"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-agent-secrets
                  key: github-token
            - name: AURORA_HOST
              valueFrom:
                secretKeyRef:
                  name: ai-agent-secrets
                  key: aurora-host
            - name: AURORA_USER
              valueFrom:
                secretKeyRef:
                  name: ai-agent-secrets
                  key: aurora-user
            - name: AURORA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-agent-secrets
                  key: aurora-password
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
# 모델 캐시 PVC (A10G 24GB VRAM 기준 — AWQ 4bit 약 20GB)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen3-model-cache-pvc
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: gp3
