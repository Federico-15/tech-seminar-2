---
# vLLM 4B Deployment — 상시 실행 (로그·메트릭 감시)
# 평상시 VRAM ~11GB 점유. CRITICAL 감지 시 replicas: 0으로 축소되어 VRAM 반환.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-4b
  namespace: ai-agents
spec:
  replicas: 1   # 평상시 상시 1개 유지
  selector:
    matchLabels:
      app: vllm-4b
  template:
    metadata:
      labels:
        app: vllm-4b
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - Qwen/Qwen3-4B
            - --max-model-len
            - "8192"
            - --host
            - "0.0.0.0"
            - --port
            - "8001"
          ports:
            - containerPort: 8001
          resources:
            limits:
              nvidia.com/gpu: 1   # A10G 1개 (VRAM ~11GB)
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          hostPath:
            path: /home/ubuntu/.cache/huggingface
            type: Directory
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
# vLLM 4B Service
apiVersion: v1
kind: Service
metadata:
  name: vllm-4b-service
  namespace: ai-agents
spec:
  selector:
    app: vllm-4b
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
  type: NodePort
---
# vLLM 8B Deployment — 이벤트 기반 실행 (CRITICAL 정밀 분석)
# 평상시 replicas: 0 (VRAM 미점유).
# CRITICAL 감지 시 k8s_scaler.py가 replicas: 1로 올림 → VRAM ~19GB 로딩(~2분).
# 분석 완료 후 다시 replicas: 0으로 축소 → 4B 복귀.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-8b
  namespace: ai-agents
spec:
  replicas: 0   # 평상시 꺼진 상태
  selector:
    matchLabels:
      app: vllm-8b
  template:
    metadata:
      labels:
        app: vllm-8b
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - Qwen/Qwen3-8B
            - --max-model-len
            - "8192"
            - --host
            - "0.0.0.0"
            - --port
            - "8002"
          ports:
            - containerPort: 8002
          resources:
            limits:
              nvidia.com/gpu: 1   # A10G 1개 (VRAM ~19GB)
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          hostPath:
            path: /home/ubuntu/.cache/huggingface
            type: Directory
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
# vLLM 8B Service
apiVersion: v1
kind: Service
metadata:
  name: vllm-8b-service
  namespace: ai-agents
spec:
  selector:
    app: vllm-8b
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30002
  type: NodePort
